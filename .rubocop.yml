plugins:
  - rubocop-performance

AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"
    - "tmp/**/*"

# Sinatra route blocks and helper methods can be long
Metrics/BlockLength:
  Max: 25
  Exclude:
    - "receiver.rb"
    - "lib/brainiac/handlers/**/*"
    - "lib/user_registry.rb"
    - "test/**/*"
    - "*.gemspec"
  CountAsOne:
    - heredoc

Metrics/MethodLength:
  Max: 45
  Exclude:
    - "bin/brainiac"
    - "lib/brainiac/handlers/**/*"
    - "monitor/**/*"

Metrics/AbcSize:
  Max: 50
  Exclude:
    - "bin/brainiac"
    - "lib/brainiac/handlers/**/*"
    - "monitor/**/*"

Metrics/CyclomaticComplexity:
  Max: 18
  Exclude:
    - "bin/brainiac"
    - "lib/brainiac/handlers/**/*"
    - "monitor/**/*"

Metrics/PerceivedComplexity:
  Max: 18
  Exclude:
    - "bin/brainiac"
    - "lib/brainiac/handlers/**/*"
    - "monitor/**/*"

Metrics/ClassLength:
  Exclude:
    - "test/**/*"
    - "lib/brainiac/card_index.rb"

Metrics/BlockNesting:
  Max: 5

Metrics/ParameterLists:
  Max: 10
  CountKeywordArgs: false

# Sinatra DSL uses top-level methods
Style/TopLevelMethodDefinition:
  Enabled: false

# receiver.rb has the SelectiveLogger class alongside Sinatra routes
Style/OneClassPerFile:
  Exclude:
    - "receiver.rb"

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Style/FrozenStringLiteralComment:
  Enabled: false

Style/ClassAndModuleChildren:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/MutableConstant:
  Enabled: false

# Dev deps in gemspec is fine for a gem this size
Gemspec/DevelopmentDependencies:
  Enabled: false

Layout/LineLength:
  Max: 150
  Exclude:
    - "receiver.rb"
    - "lib/brainiac/handlers/**/*"
    - "monitor/**/*"

# Handler methods often have unused params from Sinatra/block signatures
Lint/UnusedMethodArgument:
  AllowUnusedKeywordArguments: true

Lint/SuppressedException:
  AllowComments: true
