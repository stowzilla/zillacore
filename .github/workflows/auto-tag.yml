name: Auto Tag and Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['lib/brainiac/version.rb']

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Extract version
        id: version
        run: |
          VERSION=$(ruby -e "require './lib/brainiac/version'; puts Brainiac::VERSION")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Check if tag exists
        id: check
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/${{ steps.version.outputs.tag }}$"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
      - uses: ruby/setup-ruby@v1
        if: steps.check.outputs.exists == 'false'
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Configure gem signing key
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GEM_SIGNING_KEY }}" > ~/.ssh/gem-private_key_encrypted.pem
          chmod 600 ~/.ssh/gem-private_key_encrypted.pem
          openssl rsa -in ~/.ssh/gem-private_key_encrypted.pem -out ~/.ssh/gem-private_key.pem -passin env:GEM_SIGNING_KEY_PASSPHRASE
          chmod 600 ~/.ssh/gem-private_key.pem
          rm ~/.ssh/gem-private_key_encrypted.pem
        env:
          GEM_SIGNING_KEY_PASSPHRASE: ${{ secrets.GEM_SIGNING_KEY_PASSPHRASE }}
      - name: Build gem
        if: steps.check.outputs.exists == 'false'
        run: gem build brainiac.gemspec
      - name: Push to RubyGems
        if: steps.check.outputs.exists == 'false'
        run: gem push brainiac-*.gem
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
